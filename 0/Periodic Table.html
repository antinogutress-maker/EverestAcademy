
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Periodic Table</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-deep: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
            color: #f8fafc;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Custom Scrollbar for the table wrapper */
        .table-wrapper::-webkit-scrollbar { height: 8px; }
        .table-wrapper::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 4px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .table-wrapper::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .periodic-grid {
            display: grid;
            grid-template-columns: repeat(18, minmax(60px, 1fr));
            grid-template-rows: repeat(10, minmax(60px, 1fr));
            gap: 6px;
            padding: 20px;
            min-width: 1200px; /* Forces scroll on small screens to maintain layout */
            margin: 0 auto;
        }

        /* Element Box Styles */
        .element {
            position: relative;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
        }

        .element:hover {
            transform: scale(1.15);
            z-index: 20;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .atomic-num {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            opacity: 0.8;
        }

        .symbol {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 2px;
        }

        .name {
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
            text-align: center;
            width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Real World Color Mapping */
        .colorless {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .colorless:hover { background: rgba(255,255,255,0.08); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .silver {
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            color: #0f172a;
            border-color: #cbd5e1;
        }
        .silver:hover { box-shadow: 0 0 20px rgba(148,163,184,0.5); }

        .gold {
            background: linear-gradient(135deg, #fef08a, #eab308);
            color: #422006;
            border-color: #fef08a;
        }
        .gold:hover { box-shadow: 0 0 25px rgba(234,179,8,0.6); }

        .copper {
            background: linear-gradient(135deg, #fdba74, #b45309);
            color: #451a03;
            border-color: #fdba74;
        }
        .copper:hover { box-shadow: 0 0 25px rgba(217,119,6,0.6); }

        .grey {
            background: linear-gradient(135deg, #64748b, #334155);
            color: #f8fafc;
            border-color: #94a3b8;
        }
        .grey:hover { box-shadow: 0 0 20px rgba(100,116,139,0.5); }

        .yellow {
            background: linear-gradient(135deg, #fef08a, #ca8a04);
            color: #422006;
        }
        .pale-green {
            background: linear-gradient(135deg, #a7f3d0, #10b981);
            color: #064e3b;
        }
        .purple-dark {
            background: linear-gradient(135deg, #701a75, #4a044e);
            color: #fdf4ff;
        }
        .red-brown {
            background: linear-gradient(135deg, #b91c1c, #7f1d1d);
            color: #fef2f2;
        }
        .black {
            background: linear-gradient(135deg, #1e293b, #020617);
            color: #f8fafc;
            border-color: #475569;
        }

        /* Modal Styles */
        #element-modal {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #element-modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            position: relative;
            transform: translateY(20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        #element-modal.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            transition: color 0.2s;
        }
        .modal-close:hover { color: #fff; }

        .modal-symbol {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 5px;
        }
        .modal-name {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .modal-body {
            padding: 24px 30px;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 12px;
        }
        .stat-label {
            font-size: 0.65rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .fact-box {
            background: linear-gradient(145deg, rgba(56, 189, 248, 0.1), rgba(168, 85, 247, 0.1));
            border-left: 4px solid #38bdf8;
            padding: 16px;
            border-radius: 8px;
        }

    </style>
</head>
<body>

    <header class="p-6 text-center shrink-0">
        <h1 class="text-3xl font-extrabold tracking-widest uppercase bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-purple-500 mb-2">
            The Periodic Table
        </h1>
        <p class="text-sm text-slate-400 max-w-2xl mx-auto">
            Interactive, real-world color representation. Colorless gases are completely transparent. Click any element to discover its state and crucial role in modern technology, electronics, and daily life.
        </p>
    </header>

    <div class="table-wrapper w-full overflow-x-auto flex-grow flex items-start justify-start md:justify-center">
        <div id="grid" class="periodic-grid">
            <!-- Elements injected via JS -->
        </div>
    </div>

    <!-- The Modal -->
    <div id="element-modal" onclick="closeModal(event)">
        <div class="modal-content" id="modal-inner" onclick="event.stopPropagation()">
            <i data-lucide="x" class="modal-close w-6 h-6" onclick="closeModal(event)"></i>
            
            <div id="modal-header" class="modal-header">
                <div id="modal-num" class="absolute top-4 left-6 text-xl font-mono font-bold opacity-60">1</div>
                <div id="modal-symbol" class="modal-symbol">H</div>
                <div id="modal-name" class="modal-name">Hydrogen</div>
            </div>
            
            <div class="modal-body">
                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="stat-label">Physical State</div>
                        <div class="stat-value flex items-center gap-2">
                            <i id="state-icon" data-lucide="cloud" class="w-4 h-4 text-sky-400"></i>
                            <span id="modal-state">Gas</span>
                        </div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Appearance</div>
                        <div class="stat-value capitalize" id="modal-color">Colorless</div>
                    </div>
                </div>
                
                <div class="fact-box">
                    <div class="text-xs text-sky-400 font-bold uppercase tracking-wider mb-2 flex items-center gap-2">
                        <i data-lucide="info" class="w-4 h-4"></i> Real-World Application
                    </div>
                    <p id="modal-fact" class="text-sm text-slate-200 leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

        // Actinides (89-103) - Row 10, Col 4-18
        const actinides = [
            [89, 'Ac', 'Actinium', 'Solid', 'silver', 'Highly radioactive, glows blue in the dark.'],
            [90, 'Th', 'Thorium', 'Solid', 'silver', 'Used in high-end camping lantern mantles.'],
            [91, 'Pa', 'Protactinium', 'Solid', 'silver', 'Rare and highly radioactive. Used in research.'],
            [92, 'U', 'Uranium', 'Solid', 'silver', 'Used as fuel in nuclear power plants.'],
            [93, 'Np', 'Neptunium', 'Solid', 'silver', 'Used in neutron detection equipment.'],
            [94, 'Pu', 'Plutonium', 'Solid', 'silver', 'Powers deep space probes (like the Mars Rover) via thermoelectric generators.'],
            [95, 'Am', 'Americium', 'Solid', 'silver', 'Found in almost every household smoke detector.'],
            [96, 'Cm', 'Curium', 'Solid', 'silver', 'Used to power remote scientific instruments in space.'],
            [97, 'Bk', 'Berkelium', 'Solid', 'silver', 'Synthetic element. No commercial applications.'],
            [98, 'Cf', 'Californium', 'Solid', 'silver', 'Used in moisture gauges for oil drilling and metal detectors.'],
            [99, 'Es', 'Einsteinium', 'Solid', 'silver', 'Synthetic element. No commercial applications.'],
            [100, 'Fm', 'Fermium', 'Solid', 'silver', 'Synthetic element. No commercial applications.'],
            [101, 'Md', 'Mendelevium', 'Solid', 'silver', 'Synthetic element. No commercial applications.'],
            [102, 'No', 'Nobelium', 'Solid', 'silver', 'Synthetic element. No commercial applications.'],
            [103, 'Lr', 'Lawrencium', 'Solid', 'silver', 'Synthetic element. No commercial applications.']
        ].map((e, i) => [e[0], e[1], e[2], i + 4, 10, e[3], e[4], e[5]]);

        const allElements = [...elementData, ...lanthanides, ...actinides];

        const grid = document.getElementById('grid');

        // Render the Grid
        allElements.forEach(el => {
            const [num, sym, name, col, row, state, colorClass, fact] = el;
            
            const div = document.createElement('div');
            div.className = `element ${colorClass}`;
            div.style.gridColumn = col;
            div.style.gridRow = row;
            
            // Add a slight delay to animation for a cool cascade effect on load
            div.style.animation = `fadeIn 0.5s ease-out ${(num * 0.005)}s both`;

            div.innerHTML = `
                <div class="atomic-num">${num}</div>
                <div class="symbol">${sym}</div>
                <div class="name">${name}</div>
            `;

            div.onclick = () => openModal(num, sym, name, state, colorClass, fact);
            grid.appendChild(div);
        });

        // Modal Logic
        const modal = document.getElementById('element-modal');
        const modalInner = document.getElementById('modal-inner');
        const modalHeader = document.getElementById('modal-header');

        function openModal(num, sym, name, state, colorClass, fact) {
            document.getElementById('modal-num').innerText = num;
            document.getElementById('modal-symbol').innerText = sym;
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-state').innerText = state;
            document.getElementById('modal-fact').innerText = fact;
            
            // Update color class description for UI
            const colorText = colorClass === 'colorless' ? 'Colorless / Transparent' : 
                              colorClass === 'silver' ? 'Silvery Metallic' : 
                              colorClass === 'gold' ? 'Gold Metallic' : colorClass;
            document.getElementById('modal-color').innerText = colorText;

            // Apply specific gradient to modal header based on element color
            modalHeader.className = `modal-header ${colorClass}`;
            
            // Icon logic
            const iconEl = document.getElementById('state-icon');
            if (state === 'Gas') {
                iconEl.setAttribute('data-lucide', 'cloud');
                iconEl.className = "w-4 h-4 text-sky-400";
            } else if (state === 'Liquid') {
                iconEl.setAttribute('data-lucide', 'droplet');
                iconEl.className = "w-4 h-4 text-blue-400";
            } else {
                iconEl.setAttribute('data-lucide', 'box');
                iconEl.className = "w-4 h-4 text-slate-400";
            }
            lucide.createIcons();

            modal.classList.add('active');
        }

        function closeModal(e) {
            modal.classList.remove('active');
        }

        // Initialize Icons
        lucide.createIcons();

    </script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</body>
</html>
