<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photosynthesis for Kids</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Nunito:wght@400;700&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #e0f2fe;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3, .kid-font {
            font-family: 'Comic Neue', cursive;
        }

        /* SVG Animation Classes */
        .hidden-element {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .visible-element {
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        /* Sun Rays Animation */
        @keyframes pulse-rays {
            0% { transform: scale(1) rotate(0deg); opacity: 0.8; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0.8; }
        }
        .anim-sun-rays {
            transform-origin: 100px 100px;
            animation: pulse-rays 4s infinite ease-in-out;
        }

        /* Sunbeam Animation */
        @keyframes shine-beam {
            0% { opacity: 0; }
            50% { opacity: 0.6; }
            100% { opacity: 0; }
        }
        .anim-sunbeam {
            animation: shine-beam 3s infinite;
        }

        /* Water Droplets Animation */
        @keyframes flow-up {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; transform: translateY(-40px) scale(1); }
            80% { opacity: 1; }
            100% { transform: translateY(-250px) scale(0.5); opacity: 0; }
        }
        .water-drop {
            opacity: 0;
        }
        .anim-water .water-drop:nth-child(1) { animation: flow-up 2s infinite linear 0s; }
        .anim-water .water-drop:nth-child(2) { animation: flow-up 2.2s infinite linear 0.7s; }
        .anim-water .water-drop:nth-child(3) { animation: flow-up 1.8s infinite linear 1.2s; }

        /* CO2 Animation */
        @keyframes float-in {
            0% { transform: translate(150px, -50px); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(0, 0); opacity: 0; }
        }
        .co2-particle { opacity: 0; }
        .anim-co2 .co2-particle:nth-child(1) { animation: float-in 3s infinite ease-out 0s; }
        .anim-co2 .co2-particle:nth-child(2) { animation: float-in 3s infinite ease-out 1.5s; }

        /* O2 Animation */
        @keyframes float-out {
            0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
            20% { opacity: 1; transform: translate(-30px, -30px) scale(1); }
            80% { opacity: 1; }
            100% { transform: translate(-100px, -100px) scale(1.2); opacity: 0; }
        }
        .o2-particle { opacity: 0; }
        .anim-o2 .o2-particle:nth-child(1) { animation: float-out 3s infinite ease-in 0s; }
        .anim-o2 .o2-particle:nth-child(2) { animation: float-out 3s infinite ease-in 1.5s; }

        /* Glucose/Sugar Animation */
        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }
        .sugar-sparkle { opacity: 0; transform-origin: center; }
        .anim-sugar .sugar-sparkle:nth-child(1) { animation: sparkle 2s infinite 0s; }
        .anim-sugar .sugar-sparkle:nth-child(2) { animation: sparkle 2s infinite 0.6s; }
        .anim-sugar .sugar-sparkle:nth-child(3) { animation: sparkle 2s infinite 1.2s; }
        
        /* Plant Glow (Photosynthesis Active) */
        @keyframes plant-glow {
            0% { filter: drop-shadow(0 0 0px #4ade80); }
            50% { filter: drop-shadow(0 0 15px #4ade80); }
            100% { filter: drop-shadow(0 0 0px #4ade80); }
        }
        .anim-glow {
            animation: plant-glow 2s infinite;
        }

    </style>
</head>
<body class="bg-sky-100 p-4 md:p-8 flex flex-col items-center">

    <div class="max-w-5xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-sky-300">
        
        <!-- Header -->
        <div class="bg-sky-400 text-white p-6 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-2 tracking-wide">How Plants Make Food!</h1>
            <p class="text-xl opacity-90">An interactive lesson on Photosynthesis</p>
        </div>

        <!-- Main Content Area -->
        <div class="flex flex-col md:flex-row">
            
            <!-- SVG Canvas -->
            <div class="w-full md:w-2/3 bg-sky-50 relative p-4" style="min-height: 400px;">
                <svg viewBox="0 0 800 600" class="w-full h-auto drop-shadow-lg" id="nature-scene">
                    <defs>
                        <!-- Gradients to make it "Figure Realistic" -->
                        <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#7dd3fc" />
                            <stop offset="100%" stop-color="#e0f2fe" />
                        </linearGradient>
                        <linearGradient id="dirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#854d0e" />
                            <stop offset="100%" stop-color="#422006" />
                        </linearGradient>
                        <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#166534" />
                            <stop offset="50%" stop-color="#22c55e" />
                            <stop offset="100%" stop-color="#14532d" />
                        </linearGradient>
                        <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
                            <stop offset="0%" stop-color="#fef08a" />
                            <stop offset="70%" stop-color="#facc15" />
                            <stop offset="100%" stop-color="#eab308" />
                        </radialGradient>
                        <radialGradient id="leafGrad" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="#4ade80" />
                            <stop offset="100%" stop-color="#15803d" />
                        </radialGradient>
                        <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="rgba(253, 224, 71, 0.4)" />
                            <stop offset="100%" stop-color="rgba(253, 224, 71, 0)" />
                        </linearGradient>
                    </defs>

                    <!-- Background Sky -->
                    <rect width="800" height="600" fill="url(#skyGrad)" />

                    <!-- Sun Rays (Animated Later) -->
                    <g id="svg-sun-rays" class="hidden-element">
                        <path d="M 100 100 L 250 50 M 100 100 L 250 150 M 100 100 L 200 220 M 100 100 L 100 250 M 100 100 L 0 220" stroke="#fef08a" stroke-width="15" stroke-linecap="round" stroke-dasharray="20 15" />
                        <!-- Sunbeams hitting plant -->
                        <polygon points="100,100 500,600 200,600" fill="url(#beamGrad)" class="anim-sunbeam" />
                    </g>

                    <!-- Sun Body -->
                    <circle cx="100" cy="100" r="60" fill="url(#sunGrad)" filter="drop-shadow(0 0 10px rgba(250,204,21,0.6))" />
                    <text x="100" y="105" text-anchor="middle" fill="#854d0e" class="kid-font" font-size="20" font-weight="bold">SUN</text>

                    <!-- Ground / Soil -->
                    <path d="M 0 450 Q 200 420 400 440 T 800 460 L 800 600 L 0 600 Z" fill="url(#dirtGrad)" />
                    <text x="650" y="550" fill="#fcd34d" class="kid-font" font-size="24">SOIL</text>

                    <!-- Roots -->
                    <g stroke="#713f12" stroke-width="8" stroke-linecap="round" fill="none">
                        <path d="M 400 450 Q 380 500 350 550" />
                        <path d="M 400 450 Q 420 520 450 580" />
                        <path d="M 400 480 Q 360 520 320 510" />
                        <path d="M 410 490 Q 460 510 490 540" />
                        <path d="M 380 500 Q 390 550 370 580" />
                    </g>

                    <!-- The Plant Group -->
                    <g id="main-plant">
                        <!-- Stem -->
                        <path d="M 400 460 Q 390 300 400 150" fill="none" stroke="url(#stemGrad)" stroke-width="16" stroke-linecap="round" />
                        
                        <!-- Left Leaf -->
                        <g transform="translate(395, 320) rotate(-30)">
                            <path d="M 0 0 C -50 -80, -150 -50, -180 0 C -150 50, -50 80, 0 0" fill="url(#leafGrad)" stroke="#14532d" stroke-width="3" />
                            <path d="M 0 0 Q -90 -10 -170 0" fill="none" stroke="#14532d" stroke-width="2" />
                            <!-- Leaf Veins -->
                            <path d="M -40 -2 Q -60 -20 -80 -15 M -80 -1 Q -110 -20 -120 -10 M -40 2 Q -60 20 -80 15 M -80 1 Q -110 20 -120 10" fill="none" stroke="#166534" stroke-width="2" />
                        </g>

                        <!-- Right Leaf -->
                        <g transform="translate(405, 250) rotate(20) scale(0.9)">
                            <path d="M 0 0 C 50 -80, 150 -50, 180 0 C 150 50, 50 80, 0 0" fill="url(#leafGrad)" stroke="#14532d" stroke-width="3" />
                            <path d="M 0 0 Q 90 -10 170 0" fill="none" stroke="#14532d" stroke-width="2" />
                            <path d="M 40 -2 Q 60 -20 80 -15 M 80 -1 Q 110 -20 120 -10 M 40 2 Q 60 20 80 15 M 80 1 Q 110 20 120 10" fill="none" stroke="#166534" stroke-width="2" />
                        </g>

                        <!-- Flower (Top) -->
                        <g transform="translate(400, 150)">
                            <!-- Petals -->
                            <circle cx="0" cy="-35" r="25" fill="#f472b6" />
                            <circle cx="30" cy="-15" r="25" fill="#fb7185" />
                            <circle cx="25" cy="20" r="25" fill="#f43f5e" />
                            <circle cx="-25" cy="20" r="25" fill="#f472b6" />
                            <circle cx="-30" cy="-15" r="25" fill="#fb7185" />
                            <!-- Center -->
                            <circle cx="0" cy="0" r="20" fill="#fcd34d" stroke="#d97706" stroke-width="3" />
                            <!-- Smiley Face -->
                            <circle cx="-6" cy="-4" r="3" fill="#92400e" />
                            <circle cx="6" cy="-4" r="3" fill="#92400e" />
                            <path d="M -8 5 Q 0 12 8 5" fill="none" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" />
                        </g>
                    </g>

                    <!-- ANIMATION LAYERS -->
                    
                    <!-- 1. Water Particles (H2O) -->
                    <g id="svg-water" class="hidden-element">
                        <!-- Drops in soil -->
                        <g transform="translate(400, 520)">
                            <path class="water-drop" d="M0,0 C10,10 10,25 0,35 C-10,25 -10,10 0,0 Z" fill="#3b82f6" opacity="0.8" />
                        </g>
                        <g transform="translate(360, 480)">
                            <path class="water-drop" d="M0,0 C10,10 10,25 0,35 C-10,25 -10,10 0,0 Z" fill="#60a5fa" opacity="0.8" />
                        </g>
                        <g transform="translate(440, 550)">
                            <path class="water-drop" d="M0,0 C10,10 10,25 0,35 C-10,25 -10,10 0,0 Z" fill="#2563eb" opacity="0.8" />
                        </g>
                        <text x="250" y="520" fill="#1d4ed8" class="kid-font" font-size="22" font-weight="bold">Water (H₂O)</text>
                        <path d="M 350 515 L 380 515 M 370 505 L 380 515 L 370 525" stroke="#1d4ed8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </g>

                    <!-- 2. Carbon Dioxide Particles (CO2) -->
                    <g id="svg-co2" class="hidden-element">
                        <g transform="translate(600, 200)">
                            <g class="co2-particle">
                                <circle cx="0" cy="0" r="15" fill="#64748b" />
                                <circle cx="-12" cy="5" r="10" fill="#94a3b8" />
                                <circle cx="12" cy="5" r="10" fill="#94a3b8" />
                                <text x="0" y="4" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="sans-serif">CO₂</text>
                            </g>
                        </g>
                        <g transform="translate(650, 300)">
                            <g class="co2-particle">
                                <circle cx="0" cy="0" r="15" fill="#64748b" />
                                <circle cx="-12" cy="5" r="10" fill="#94a3b8" />
                                <circle cx="12" cy="5" r="10" fill="#94a3b8" />
                                <text x="0" y="4" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="sans-serif">CO₂</text>
                            </g>
                        </g>
                        <text x="600" y="150" fill="#334155" class="kid-font" font-size="22" font-weight="bold">Carbon Dioxide</text>
                    </g>

                    <!-- 3. Oxygen Particles (O2) - Result -->
                    <g id="svg-o2" class="hidden-element">
                        <g transform="translate(250, 250)">
                            <g class="o2-particle">
                                <circle cx="0" cy="0" r="18" fill="#bae6fd" opacity="0.8" />
                                <circle cx="15" cy="0" r="18" fill="#bae6fd" opacity="0.8" />
                                <text x="7" y="5" text-anchor="middle" fill="#0369a1" font-size="14" font-weight="bold" font-family="sans-serif">O₂</text>
                            </g>
                        </g>
                        <g transform="translate(200, 350)">
                            <g class="o2-particle">
                                <circle cx="0" cy="0" r="18" fill="#bae6fd" opacity="0.8" />
                                <circle cx="15" cy="0" r="18" fill="#bae6fd" opacity="0.8" />
                                <text x="7" y="5" text-anchor="middle" fill="#0369a1" font-size="14" font-weight="bold" font-family="sans-serif">O₂</text>
                            </g>
                        </g>
                        <text x="50" y="200" fill="#0284c7" class="kid-font" font-size="24" font-weight="bold">Oxygen (Fresh Air!)</text>
                    </g>

                    <!-- 4. Sugar/Glucose (Energy) - Result -->
                    <g id="svg-sugar" class="hidden-element">
                        <!-- Sparkles on leaves -->
                        <g transform="translate(280, 300)">
                            <path class="sugar-sparkle" d="M0,-15 L3,-4 L15,0 L3,4 L0,15 L-3,4 L-15,0 L-3,-4 Z" fill="#fcd34d" />
                        </g>
                        <g transform="translate(500, 260)">
                            <path class="sugar-sparkle" d="M0,-15 L3,-4 L15,0 L3,4 L0,15 L-3,4 L-15,0 L-3,-4 Z" fill="#fcd34d" />
                        </g>
                        <g transform="translate(400, 200)">
                            <path class="sugar-sparkle" d="M0,-20 L4,-5 L20,0 L4,5 L0,20 L-4,5 L-20,0 L-4,-5 Z" fill="#fcd34d" />
                        </g>
                        <text x="480" y="180" fill="#d97706" class="kid-font" font-size="24" font-weight="bold">Sugar (Food!)</text>
                    </g>

                </svg>
            </div>

            <!-- Control Panel Area -->
            <div class="w-full md:w-1/3 bg-white p-6 md:p-8 flex flex-col justify-center border-t-4 md:border-t-0 md:border-l-4 border-sky-200">
                
                <!-- Progress Indicator -->
                <div class="flex justify-between mb-6">
                    <div id="dot-0" class="w-4 h-4 rounded-full bg-sky-500"></div>
                    <div id="dot-1" class="w-4 h-4 rounded-full bg-gray-200"></div>
                    <div id="dot-2" class="w-4 h-4 rounded-full bg-gray-200"></div>
                    <div id="dot-3" class="w-4 h-4 rounded-full bg-gray-200"></div>
                    <div id="dot-4" class="w-4 h-4 rounded-full bg-gray-200"></div>
                </div>

                <div class="flex-grow flex flex-col justify-center">
                    <h2 id="step-title" class="text-3xl text-sky-800 font-bold mb-4">The Hungry Plant</h2>
                    <p id="step-desc" class="text-lg text-gray-600 mb-8 leading-relaxed">
                        Plants are amazing! They don't eat burgers or pizza. They make their own food right inside their leaves. Let's find out what they need...
                    </p>
                </div>

                <div class="flex flex-col gap-3">
                    <button id="btn-next" class="bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-4 px-6 rounded-2xl shadow-lg transform transition active:scale-95 kid-font tracking-wider">
                        START LESSON 🚀
                    </button>
                    <button id="btn-reset" class="text-gray-400 hover:text-gray-600 font-semibold py-2 hidden underline">
                        Restart
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // State management
        let currentStep = 0;

        // DOM Elements
        const titleEl = document.getElementById('step-title');
        const descEl = document.getElementById('step-desc');
        const btnNext = document.getElementById('btn-next');
        const btnReset = document.getElementById('btn-reset');
        
        // SVG Elements
        const svgWater = document.getElementById('svg-water');
        const svgSunRays = document.getElementById('svg-sun-rays');
        const svgCO2 = document.getElementById('svg-co2');
        const svgO2 = document.getElementById('svg-o2');
        const svgSugar = document.getElementById('svg-sugar');
        const mainPlant = document.getElementById('main-plant');

        // The Lesson Steps
        const lessonSteps = [
            {
                title: "The Hungry Plant",
                desc: "Plants are amazing! They don't eat burgers or pizza. They make their own food right inside their leaves using a magic trick called Photosynthesis. Let's find out what they need...",
                btnText: "START LESSON 🚀",
                action: () => {} 
            },
            {
                title: "1. Add Water (H₂O)",
                desc: "First, it needs a drink! The roots suck up WATER from the soil. The water travels all the way up the stem into the leaves.",
                btnText: "GIVE SUNLIGHT ☀️",
                action: () => {
                    svgWater.classList.remove('hidden-element');
                    svgWater.classList.add('visible-element', 'anim-water');
                }
            },
            {
                title: "2. Add Sunlight",
                desc: "Next, it needs energy! The sun shines down, and the big green leaves catch the SUNLIGHT. The leaves act like little solar panels.",
                btnText: "BREATHE IN AIR 💨",
                action: () => {
                    svgSunRays.classList.remove('hidden-element');
                    svgSunRays.classList.add('visible-element', 'anim-sun-rays');
                }
            },
            {
                title: "3. Carbon Dioxide",
                desc: "Finally, it takes a deep breath. Plants breathe in a gas from the air called CARBON DIOXIDE (CO₂). We breathe this out, but plants love it!",
                btnText: "MAKE FOOD! 🌟",
                action: () => {
                    svgCO2.classList.remove('hidden-element');
                    svgCO2.classList.add('visible-element', 'anim-co2');
                }
            },
            {
                title: "4. Photosynthesis!",
                desc: "MAGIC! The plant mixes the Water, Sun, and CO₂ together. It creates sweet SUGAR for itself to eat, and breathes out fresh OXYGEN (O₂) for us to breathe!",
                btnText: "FINISH 🎉",
                action: () => {
                    // Plant glows
                    mainPlant.classList.add('anim-glow');
                    // Show Output
                    svgO2.classList.remove('hidden-element');
                    svgO2.classList.add('visible-element', 'anim-o2');
                    
                    svgSugar.classList.remove('hidden-element');
                    svgSugar.classList.add('visible-element', 'anim-sugar');
                    
                    btnNext.classList.add('hidden');
                    btnReset.classList.remove('hidden');
                }
            }
        ];

        function updateDots(step) {
            for(let i=0; i<5; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if(i <= step) {
                    dot.classList.remove('bg-gray-200');
                    dot.classList.add('bg-sky-500');
                } else {
                    dot.classList.remove('bg-sky-500');
                    dot.classList.add('bg-gray-200');
                }
            }
        }

        function nextStep() {
            currentStep++;
            if (currentStep < lessonSteps.length) {
                const stepData = lessonSteps[currentStep];
                
                // Update Text
                titleEl.textContent = stepData.title;
                descEl.textContent = stepData.desc;
                btnNext.textContent = stepData.btnText;
                
                // Update Progress Dots
                updateDots(currentStep);

                // Run Animation Action
                stepData.action();
            }
        }

        function resetLesson() {
            currentStep = 0;
            
            // Reset Text
            titleEl.textContent = lessonSteps[0].title;
            descEl.textContent = lessonSteps[0].desc;
            btnNext.textContent = lessonSteps[0].btnText;
            
            // Reset Buttons
            btnNext.classList.remove('hidden');
            btnReset.classList.add('hidden');
            
            // Reset Dots
            updateDots(0);

            // Hide all SVG elements
            const elementsToHide = [svgWater, svgSunRays, svgCO2, svgO2, svgSugar];
            elementsToHide.forEach(el => {
                el.classList.add('hidden-element');
                el.classList.remove('visible-element', 'anim-water', 'anim-sun-rays', 'anim-co2', 'anim-o2', 'anim-sugar');
            });
            
            mainPlant.classList.remove('anim-glow');
        }

        // Event Listeners
        btnNext.addEventListener('click', nextStep);
        btnReset.addEventListener('click', resetLesson);

    </script>
</body>
</html>
