
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everest Academy School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --test-red: rgba(239, 68, 68, 0.25);
            --test-red-border: rgba(239, 68, 68, 0.5);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: var(--glass-shadow);
        }

        .glass-red {
            background: var(--test-red);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid var(--test-red-border);
            border-radius: 28px;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        /* Animated School Name */
        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        .school-name span {
            display: inline-block;
            animation: float 3s ease-in-out infinite alternate;
        }

        .everest { color: #ff5e62; text-shadow: 0 0 15px rgba(255,94,98,0.4); }
        .academy { color: #00f2fe; text-shadow: 0 0 15px rgba(0,242,254,0.4); }
        .school { color: #f9d423; text-shadow: 0 0 15px rgba(249,212,35,0.4); }

        /* Slogan Animation */
        .slogan-text {
            background: linear-gradient(90deg, #ff8a00, #e52e71, #00f2fe, #ff8a00);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 4s linear infinite;
        }

        @keyframes gradientFlow {
            to { background-position: 300% center; }
        }

        .photo-frame {
            position: relative;
            padding: 10px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            border-radius: 30px;
        }

        .photo-frame img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .view-hidden { display: none; }

        .btn-tap {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-tap:active {
            transform: scale(0.94);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 sm:p-6 flex flex-col items-center">

    <div class="w-full max-w-md">
        
        <!-- HOME SCREEN -->
        <div id="home-screen" class="space-y-8 py-4">
            
            <!-- School Identity -->
            <div class="text-center space-y-1">
                <h1 class="school-name text-4xl font-extrabold tracking-tight flex flex-col leading-none">
                    <span class="everest">EVEREST</span>
                    <span class="academy">ACADEMY</span>
                    <span class="school">SCHOOL</span>
                </h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-[0.25em] pt-1">
                    GODAWARI 02 ATTARIYA, KAILALI
                </p>
            </div>

            <!-- Photo Frame -->
            <div class="photo-frame glass">
                <img src="school.png" alt="Everest Academy" onerror="this.src='https://images.unsplash.com/photo-1546410531-bb4caa6b424d?auto=format&fit=crop&w=800&q=80'">
            </div>

            <!-- Slogan Section -->
            <div class="text-center px-2">
                <p class="slogan-text text-xl font-bold italic leading-tight">
                    "We believe in Modern way of Learning for Deep Understanding"
                </p>
            </div>

            <!-- Class Identifier -->
            <div class="text-center">
                <h2 class="text-red-500 font-black text-3xl italic tracking-tighter drop-shadow-lg">
                    SCIENCE CLASS 5
                </h2>
            </div>

            <!-- Main Categories -->
            <div class="space-y-5 pt-2">

                <!-- Important Knowledge Full Width -->
                <button onclick="openCategory('0', 'Important Knowledge')" class="glass p-5 w-full text-left btn-tap group relative overflow-hidden">
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-amber-400 font-bold uppercase tracking-widest mb-1">Essential Learning</span>
                            <span class="text-xl font-extrabold group-hover:translate-x-1 transition-transform leading-tight text-white">Important Knowledge</span>
                        </div>
                        <div class="bg-amber-500/20 p-3 rounded-2xl">
                            <svg class="w-6 h-6 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                        </div>
                    </div>
                </button>
                
                <!-- Chapter 1 Row -->
                <div class="flex gap-3">
                    <button onclick="openCategory('1', 'Scientific Learning')" class="glass p-5 flex-1 text-left btn-tap group">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mb-1">Chapter 01</span>
                            <span class="text-lg font-bold group-hover:translate-x-1 transition-transform leading-tight">Scientific Learning</span>
                        </div>
                    </button>
                    <a href="1/Test.html" class="glass-red w-32 flex flex-col items-center justify-center btn-tap group text-center no-underline text-white">
                        <svg class="w-7 h-7 text-red-500 mb-1 drop-shadow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        <span class="text-[10px] font-black uppercase tracking-tighter text-red-100">Chapter Wise<br>Test</span>
                    </a>
                </div>

                <!-- Chapter 2 Row -->
                <div class="flex gap-3">
                    <button onclick="openCategory('2', 'Measurement')" class="glass p-5 flex-1 text-left btn-tap group">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-purple-400 font-bold uppercase tracking-widest mb-1">Chapter 02</span>
                            <span class="text-lg font-bold group-hover:translate-x-1 transition-transform leading-tight">Measurement</span>
                        </div>
                    </button>
                    <a href="2/Test.html" class="glass-red w-32 flex flex-col items-center justify-center btn-tap group text-center no-underline text-white">
                        <svg class="w-7 h-7 text-red-500 mb-1 drop-shadow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        <span class="text-[10px] font-black uppercase tracking-tighter text-red-100">Chapter Wise<br>Test</span>
                    </a>
                </div>

            </div>
        </div>

        <!-- SUBTOPICS SCREEN -->
        <div id="sub-screen" class="view-hidden space-y-6 py-4">
            <div class="flex items-center gap-4">
                <button onclick="goBack()" class="glass p-3 btn-tap">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <h3 id="category-title" class="text-2xl font-bold text-white tracking-tight">Topics</h3>
            </div>

            <div id="topic-container" class="grid gap-3">
                <!-- Topics will be injected here -->
            </div>
        </div>

    </div>

    <script>
        const studyData = {
            "0": [
                "Photosynthesis",
                "States of Matter",
                "Solar System",
                "Periodic Table"
            ],
            "1": [
                "Scientific Learning Process",
                "Observation",
                "Experiment lesson 1",
                "Experiment lesson 2"
            ],
            "2": [
                "Measurement of mass",
                "Measurement of volumne"
            ]
        };

        const homeView = document.getElementById('home-screen');
        const subView = document.getElementById('sub-screen');
        const topicContainer = document.getElementById('topic-container');
        const categoryTitle = document.getElementById('category-title');

        function openCategory(id, name) {
            categoryTitle.innerText = name;
            topicContainer.innerHTML = '';
            
            const topics = studyData[id];
            
            topics.forEach((topic, index) => {
                const link = document.createElement('a');
                link.href = `${id}/${topic}.html`;
                link.className = `glass p-5 flex items-center justify-between no-underline text-white btn-tap opacity-0 translate-y-4`;
                link.style.animation = `slideUp 0.4s ease forwards ${index * 0.1}s`;
                
                link.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-2xl bg-white/10 flex items-center justify-center font-black text-sm text-blue-300">
                            0${index + 1}
                        </div>
                        <span class="font-semibold text-lg leading-tight">${topic}</span>
                    </div>
                    <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                `;
                topicContainer.appendChild(link);
            });

            homeView.classList.add('view-hidden');
            subView.classList.remove('view-hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goBack() {
            subView.classList.add('view-hidden');
            homeView.classList.remove('view-hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
