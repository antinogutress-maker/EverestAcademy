
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bagmati 5th Mock Test 7</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* [COLOR PALETTE & CORE STYLES] */
        :root { --primary: #FF3366; --secondary: #FF9933; --accent: #00E5FF; --glass-bg: rgba(255, 255, 255, 0.15); --glass-border: rgba(255, 255, 255, 0.3); --text-color: #ffffff; --card-bg: rgba(15, 15, 30, 0.92); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #FF0844 0%, #FFB199 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--text-color); padding: 15px; overflow-x: hidden; }

        .app-container { width: 100%; max-width: 650px; background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden; transition: all 0.4s ease; }
        h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(to right, #00E5FF, #B400FB); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        h2 { font-size: 1.5rem; margin-bottom: 20px; }
        
        .btn { background: linear-gradient(90deg, #00E5FF, #B400FB); border: none; color: white; padding: 16px; width: 100%; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 20px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 5px 20px rgba(0, 229, 255, 0.3); min-height: 50px; display: flex; justify-content: center; align-items: center; text-decoration: none; }
        .btn:active { transform: scale(0.98); }
        .btn-outline { background: transparent; border: 2px solid var(--glass-border); box-shadow: none; margin-top: 10px; color: white; }
        
        .personal-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border); min-height: 50px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .review-badge { background: #FF3366; color: white; font-size: 0.8rem; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: none; }
        
        .animate-praise { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        /* [SMOOTH LOADING ANIMATION] */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .info-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 10px; }
        .timer-badge { font-family: monospace; font-weight: 700; color: var(--accent); font-size: 1.1rem; }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
        
        .option-btn { width: 100%; padding: 18px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; text-align: left; color: #ddd; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; -webkit-user-select: none; user-select: none; }
        .option-marker { width: 30px; height: 30px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: 700; flex-shrink: 0; }
        
        /* UPDATED: Solid bright backgrounds for correct and wrong options */
        .correct { background: #00FF88 !important; border-color: #00FF88 !important; color: #000000 !important; }
        .correct .option-marker { background: #ffffff; color: #000000; }
        
        .wrong { background: #FF3366 !important; border-color: #FF3366 !important; color: #ffffff !important; }
        .wrong .option-marker { background: #ffffff; color: #FF3366; }
        
        .explanation-box { margin-top: 20px; padding: 15px; background: rgba(180, 0, 251, 0.15); border-left: 4px solid var(--secondary); border-radius: 8px; font-size: 0.9rem; display: none; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .score-circle { width: 160px; height: 160px; border-radius: 50%; border: 5px solid var(--primary); margin: 0 auto 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0, 229, 255, 0.2); }
        .score-val { font-size: 3.5rem; font-weight: 800; color: white; line-height: 1; }
        
        .hidden { display: none !important; }
        #opts-list { max-height: 50vh; overflow-y: auto; padding-right: 5px; }
    </style>
</head>
<body>

<div class="app-container" id="app">

    <div id="view-quiz" class="hidden fade-in">
        <div class="personal-header">
            <span id="review-badge" class="review-badge">Review Mode</span>
            <div id="praise-txt" style="font-size: 1.2rem; font-weight: 700; color: white;">Good Luck!</div>
        </div>

        <div class="info-bar">
            <span>Q: <span id="q-idx">1</span> / <span id="q-total">50</span></span>
            <span class="timer-badge" id="timer">45:00</span>
        </div>

        <div id="q-container">
            <div class="question-text" id="q-text"></div>
            <div id="opts-list"></div>
            <div class="explanation-box" id="exp-box"></div>
        </div>

        <button class="btn hidden" id="btn-next" onclick="App.next()">Next Question</button>
    </div>

    <div id="view-result" class="hidden fade-in" style="text-align: center;">
        <h2>Quiz Completed!</h2>
        <div class="score-circle">
            <span class="score-val" id="res-score">0</span>
            <span style="font-size: 0.8rem; text-transform: uppercase; color: #aaa;">Correct</span>
        </div>
        <div style="margin-bottom: 30px;">
            <h3 id="res-pct" style="color: var(--primary);">0% Accuracy</h3>
        </div>
        <button class="btn" onclick="App.start(false)">Restart Test</button>
        <button class="btn btn-outline" id="btn-review" onclick="App.start(true)" style="display: none; border-color: var(--primary); color: white;">Review Mistakes</button>
        
    </div>
</div>

<script>
// --- DATASET ---
const DB = [
  
  {
    "id": 1,
    "q": "What do we call the act of finding the size, amount, or weight of something?",
    "o": ["Cooking", "Measurement", "Running", "Reading"],
    "a": 1
  },
  {
    "id": 2,
    "q": "Which of these is a 'standard unit' of length used all over the world?",
    "o": ["Handspan", "Footstep", "Metre", "Pencil length"],
    "a": 2
  },
  {
    "id": 3,
    "q": "Measurement helps us to get ________ results.",
    "o": ["Wrong", "Guessing", "Accurate", "Random"],
    "a": 2
  },
  {
    "id": 4,
    "q": "What are you measuring when you check how 'heavy' an object is?",
    "o": ["Volume", "Mass", "Length", "Time"],
    "a": 1
  },
  {
    "id": 5,
    "q": "Which tool is used to measure the mass of vegetables in a market?",
    "o": ["Ruler", "Thermometer", "Beam Balance", "Measuring Cylinder"],
    "a": 2
  },
  {
    "id": 6,
    "q": "How many grams (g) make up 1 kilogram (kg)?",
    "o": ["10 grams", "100 grams", "1000 grams", "500 grams"],
    "a": 2
  },
  {
    "id": 7,
    "q": "Which unit would you use to measure a very small amount of gold?",
    "o": ["Kilogram", "Milligram", "Litre", "Metre"],
    "a": 1
  },
  {
    "id": 8,
    "q": "A digital weighing machine is used to measure:",
    "o": ["Time", "Mass", "Liquid", "Height"],
    "a": 1
  },
  {
    "id": 9,
    "q": "What is the amount of 'space' occupied by an object called?",
    "o": ["Mass", "Weight", "Volume", "Area"],
    "a": 2
  },
  {
    "id": 10,
    "q": "Which tool is best for measuring the volume of a liquid like water?",
    "o": ["Measuring Cylinder", "Clock", "Ruler", "Compass"],
    "a": 0
  },
  {
    "id": 11,
    "q": "The standard unit for measuring the volume of liquids is:",
    "o": ["Gram", "Litre", "Second", "Kilometre"],
    "a": 1
  },
  {
    "id": 12,
    "q": "If a bottle has 1000 millilitres (ml) of juice, it is equal to:",
    "o": ["1 Litre", "10 Litres", "5 Litres", "100 Litres"],
    "a": 0
  },
  {
    "id": 13,
    "q": "To find the volume of a solid box, we multiply Length × Breadth × ________.",
    "o": ["Weight", "Time", "Height", "Color"],
    "a": 2
  },
  {
    "id": 14,
    "q": "Which unit would you use to measure a small dose of medicine syrup?",
    "o": ["Kilogram", "Millilitre", "Kilometre", "Hour"],
    "a": 1
  },
  {
    "id": 15,
    "q": "What are you measuring when you check the duration between two events?",
    "o": ["Mass", "Volume", "Time", "Length"],
    "a": 2
  },
  {
    "id": 16,
    "q": "The basic unit of time is:",
    "o": ["Minute", "Hour", "Second", "Day"],
    "a": 2
  },
  {
    "id": 17,
    "q": "How many minutes are there in 1 hour?",
    "o": ["100 minutes", "30 minutes", "60 minutes", "12 minutes"],
    "a": 2
  },
  {
    "id": 18,
    "q": "Which tool would a coach use to measure the exact time of a 100m race?",
    "o": ["Wall Clock", "Sundial", "Stopwatch", "Calendar"],
    "a": 2
  },
  {
    "id": 19,
    "q": "One complete day and night is equal to how many hours?",
    "o": ["12 hours", "24 hours", "60 hours", "7 hours"],
    "a": 1
  },
  {
    "id": 20,
    "q": "Measurement is important in our daily life because it helps us to:",
    "o": ["Buy correct amounts", "Build houses accurately", "Tell the time", "All of the above"],
    "a": 3
  }
];

const PRAISE = {
    good: ["You are a Genius", "Amazing", "Fantastic", "Excellent", "You are Awesome"],
    bad: ["Don't give up", " Try Again", "You can do this" ]
};

const MISTAKES_KEY = "mock_mistakes";

const App = {
    state: { quiz: [], curr: 0, score: 0, timer: null, isReview: false },

    // Mistake Bank Functions
    saveMistake: (id) => {
        let m = JSON.parse(localStorage.getItem(MISTAKES_KEY) || "[]");
        if (!m.includes(id)) m.push(id);
        localStorage.setItem(MISTAKES_KEY, JSON.stringify(m));
    },
    
    removeMistake: (id) => {
        let m = JSON.parse(localStorage.getItem(MISTAKES_KEY) || "[]");
        m = m.filter(mid => mid !== id);
        localStorage.setItem(MISTAKES_KEY, JSON.stringify(m));
    },

    getMistakesCount: () => {
        return JSON.parse(localStorage.getItem(MISTAKES_KEY) || "[]").length;
    },

    start: (reviewMode) => {
        App.state.curr = 0; 
        App.state.score = 0; 
        App.state.isReview = reviewMode;
        
        const flatDB = DB.flat ? DB.flat() : DB;
        let source = [...flatDB];
        
        if(reviewMode) {
            let m = JSON.parse(localStorage.getItem(MISTAKES_KEY) || "[]");
            source = source.filter(q => m.includes(q.id));
            if(source.length === 0) {
                alert("Awesome! You have no mistakes left to review.");
                return;
            }
        }

        if(!source.length) return alert("No questions available.");

        // UPDATED LOGIC: Handle correct answer matching whether it's an INDEX (number) or TEXT (string)
        App.state.quiz = source.map(q => {
            let opts = q.o.map((txt, i) => {
                let isCorrect = typeof q.a === 'number' ? i === q.a : txt === q.a;
                return { t: txt, c: isCorrect };
            });
            return { ...q, shuffledOpts: opts.sort(() => Math.random() - 0.5) };
        }).sort(() => Math.random() - 0.5);

        // UI toggles
        document.getElementById('view-result').classList.add('hidden');
        document.getElementById('view-quiz').classList.remove('hidden');
        document.getElementById('review-badge').style.display = reviewMode ? 'inline-block' : 'none';
        document.getElementById('praise-txt').innerText = reviewMode ? "Let's fix those mistakes!" : "Good Luck!";
        document.getElementById('q-total').innerText = App.state.quiz.length;
        
        // Remove fade-in to trigger it again cleanly
        const viewQuiz = document.getElementById('view-quiz');
        viewQuiz.classList.remove('fade-in');
        void viewQuiz.offsetWidth; 
        viewQuiz.classList.add('fade-in');

        App.timer(45 * 60);
        App.render();
    },

    render: () => {
        const q = App.state.quiz[App.state.curr];
        document.getElementById('q-idx').innerText = App.state.curr + 1;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('btn-next').classList.add('hidden');
        
        const list = document.getElementById('opts-list');
        list.innerHTML = '';
        q.shuffledOpts.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<div class="option-marker">${String.fromCharCode(65+i)}</div>${opt.t}`;
            btn.onclick = () => App.check(btn, opt, q);
            list.appendChild(btn);
        });
    },

    // CHECK FUNCTION WITH BRIGHT BACKGROUNDS
    check: (btn, opt, q) => {
        const all = document.querySelectorAll('.option-btn');
        
        // Dim all options initially to show inactivity
        all.forEach(b => { b.onclick = null; b.style.opacity = '0.5'; });
        
        const praise = document.getElementById('praise-txt');
        praise.classList.remove('animate-praise');
        void praise.offsetWidth; praise.classList.add('animate-praise');

        if(opt.c) {
            // User clicked the correct option
            btn.style.opacity = '1';
            btn.classList.add('correct');
            App.state.score++;
            praise.innerText = PRAISE.good[Math.floor(Math.random()*PRAISE.good.length)] + "!";
            praise.style.color = "#00FF88";
            
            App.removeMistake(q.id); // Remove from mistake bank if correct
        } else {
            // User clicked the wrong option
            btn.style.opacity = '1';
            btn.classList.add('wrong');
            
            // Highlight the correct option
            all.forEach((b, i) => { 
                if(q.shuffledOpts[i].c) {
                    b.classList.add('correct');
                    b.style.opacity = '1'; // Bring opacity back to 100% for the correct option
                } 
            });
            
            praise.innerText = PRAISE.bad[Math.floor(Math.random()*PRAISE.bad.length)] + "!";
            praise.style.color = "#FF3366";
            
            App.saveMistake(q.id); // Add to mistake bank if wrong
        }

        if(q.e) {
            document.getElementById('exp-box').innerHTML = `<strong>Explanation:</strong> ${q.e}`;
            document.getElementById('exp-box').style.display = 'block';
        }
        document.getElementById('btn-next').classList.remove('hidden');
        setTimeout(() => document.getElementById('btn-next').scrollIntoView({behavior:"smooth", block:"nearest"}), 100);
    },

    next: () => {
        App.state.curr++;
        if(App.state.curr < App.state.quiz.length) App.render();
        else App.finish();
    },

    timer: (sec) => {
        if(App.state.timer) clearInterval(App.state.timer);
        App.state.timer = setInterval(() => {
            sec--;
            let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(sec<=0) App.finish();
        }, 1000);
    },

    finish: () => {
        clearInterval(App.state.timer);
        document.getElementById('view-quiz').classList.add('hidden');
        document.getElementById('view-result').classList.remove('hidden');

        // Show Review button only if mistakes exist
        const hasMistakes = App.getMistakesCount() > 0;
        document.getElementById('btn-review').style.display = hasMistakes ? 'flex' : 'none';

        const pct = Math.round((App.state.score / App.state.quiz.length) * 100);
        document.getElementById('res-score').innerText = App.state.score;
        document.getElementById('res-pct').innerText = `${pct}% Accuracy`;
        
        // Remove fade-in to trigger it again cleanly
        const viewResult = document.getElementById('view-result');
        viewResult.classList.remove('fade-in');
        void viewResult.offsetWidth; 
        viewResult.classList.add('fade-in');
    }
};

// Immediate start ensures a smooth, instant load without the "Loading..." text flash
App.start(false);
</script>
</body>
</html>
